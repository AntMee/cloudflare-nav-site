<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>CloudNav 网址导航</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="CloudNav 首页">
        <span class="brand-mark">C</span>
        <span>CloudNav</span>
      </a>
      <nav class="top-nav" aria-label="主导航">
        <a href="#featured">精选</a>
        <a href="#catalog">分类</a>
        <a href="#admin">录入</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <h1>面向团队的轻量网址导航站</h1>
          <p>部署在 Cloudflare Workers，D1 保存结构化目录，KV 缓存公开列表。适合沉淀工具入口、文档链接、项目资源和内部服务地址。</p>
          <div class="hero-actions">
            <a class="button primary" href="#catalog">浏览目录</a>
            <a class="button secondary" href="#admin">添加链接</a>
          </div>
        </div>
        <form class="search-panel" role="search">
          <label for="search">搜索站点、描述或标签</label>
          <div class="search-box">
            <input id="search" name="search" type="search" placeholder="例如 Workers、图标、文档" autocomplete="off">
            <button type="reset" aria-label="清空搜索">清空</button>
          </div>
          <p id="summary" class="summary">正在载入目录...</p>
        </form>
      </section>

      <section id="featured" class="section">
        <div class="section-heading">
          <h2>精选入口</h2>
          <p>常用或高优先级地址会集中展示在这里。</p>
        </div>
        <div id="featuredLinks" class="link-grid compact" aria-live="polite"></div>
      </section>

      <section id="catalog" class="section">
        <div class="section-heading">
          <h2>全部分类</h2>
          <p>D1 中的分类和链接按排序字段稳定展示。</p>
        </div>
        <div id="categories" class="category-list" aria-live="polite"></div>
      </section>

      <section id="admin" class="section admin-section">
        <div class="section-heading">
          <h2>快速录入</h2>
          <p>写入接口需要 Bearer Token，对应 Worker Secret 中的 ADMIN_TOKEN。</p>
        </div>
        <form id="linkForm" class="admin-form">
          <label>
            管理 Token
            <input name="token" type="password" autocomplete="off" placeholder="仅保存在当前浏览器表单中">
          </label>
          <label>
            分类
            <select name="categoryId" required></select>
          </label>
          <label>
            标题
            <input name="title" required maxlength="80" placeholder="工具或站点名称">
          </label>
          <label>
            URL
            <input name="url" required type="url" placeholder="https://example.com">
          </label>
          <label class="wide">
            描述
            <textarea name="description" maxlength="180" rows="3" placeholder="这个入口适合什么场景"></textarea>
          </label>
          <label>
            标签
            <input name="tags" placeholder="逗号分隔，例如 docs, api">
          </label>
          <label class="checkbox">
            <input name="isFeatured" type="checkbox">
            <span>加入精选入口</span>
          </label>
          <button class="button primary" type="submit">保存链接</button>
          <p id="formStatus" class="form-status" role="status"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <span>Cloudflare Workers + D1 + KV</span>
      <span>静态页面由 Worker Assets 提供</span>
    </footer>

    <template id="linkCardTemplate">
      <article class="link-card">
        <div class="link-card-head">
          <h3></h3>
          <a target="_blank" rel="noreferrer" aria-label="打开链接">打开</a>
        </div>
        <p></p>
        <div class="tags"></div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
